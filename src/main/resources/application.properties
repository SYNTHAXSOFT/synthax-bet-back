# ============================================
# BASE DE DATOS
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/synthax_bet_bd
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# show-sql desactivado en analisis masivo (loggear cada SQL multiplica el tiempo x3)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Batch inserts: agrupa los INSERTs en lotes de 50 en lugar de uno por uno ──
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Datos semilla: carga data.sql al arrancar (INSERT IGNORE, no borra nada) ──
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================================
# JWT
# ============================================
jwt.secret=myVerySecretKeyThatIsAtLeast32CharactersLong12345
jwt.expiration=86400000

